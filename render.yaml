services:
  - type: web
    name: edencode-anchor
    env: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/db/migrate.js && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANCHOR_MODE
        value: hashonly
      - key: NODE_ENV
        value: production
